<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mirella ❤️</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="hearts-container"></div>

    <div class="center-container">
        <img src="img/mi e eu .jpg" alt="Nossa foto" class="floating-img" id="botao-foto">
    </div>

    <div id="transition-overlay"></div>

    <div id="mini-player" class="mini-player closed">
        <button id="toggle-player" class="toggle-btn">🎵</button>
        <div class="player-content">
            <span>Nossa Música</span>
            <audio id="audio-track" controls loop>
                <source src="Taylor Swift - Wood (Lyrics).mp3" type="audio/mpeg">
                Seu navegador não suporta o elemento de áudio.
            </audio>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
